apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: devops-demo

  template:
    metadata:
      labels:
        app: devops-demo

    spec:
      containers:
      - name: devops-demo
        image: 574644334284.dkr.ecr.ap-south-1.amazonaws.com/devops-demo:v1
        ports:
        - containerPort: 80
